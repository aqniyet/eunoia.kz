name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EUNOIA_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo '82.115.48.95 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMsUvlcXSqfxwdJoGf6dLYa8aD/ZjWOa9jO2smpujyhJ' > ~/.ssh/known_hosts

      - name: Rsync site to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'CNAME' \
            --exclude '.nojekyll' \
            --exclude 'CLAUDE.md' \
            --exclude 'generate_pdf.py' \
            --exclude 'eunoia.kz' \
            ./ eunoia@82.115.48.95:/opt/eunoia/site/
