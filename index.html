    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0c;
            --surface: #111114;
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e6e3;
            --text-secondary: #6b6a6f;
            --accent: #c8ff2e;
            --accent-dim: rgba(200, 255, 46, 0.08);
            --accent-glow: rgba(200, 255, 46, 0.15);
            --whatsapp: #25d366;
            --whatsapp-dark: #1da851;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Atmospheric background ── */
        .atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .atmosphere__grain {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
            opacity: 0.5;
        }

        .atmosphere__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            animation: drift 20s ease-in-out infinite;
        }

        .atmosphere__orb--1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -200px;
            right: -150px;
            animation-delay: 0s;
        }

        .atmosphere__orb--2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 255, 46, 0.06) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation-delay: -7s;
            animation-duration: 25s;
        }

        .atmosphere__orb--3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -12s;
            animation-duration: 18s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(15px, 15px) scale(1.02); }
        }

        /* ── Grid lines ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 100%);
        }

        /* ── Main content ── */
        .hold-page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            max-width: 680px;
            width: 100%;
        }

        /* ── Status pill ── */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: var(--accent-dim);
            border: 1px solid rgba(200, 255, 46, 0.12);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 3rem;
            animation: fadeSlideIn 0.8s ease-out both;
        }

        .status-pill__dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
        }

        /* ── Logo ── */
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(3.5rem, 10vw, 7rem);
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(
                135deg,
                var(--text-primary) 0%,
                var(--text-primary) 40%,
                var(--accent) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeSlideIn 0.8s ease-out 0.15s both;
        }

        /* ── Divider ── */
        .divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin-bottom: 2.5rem;
            animation: fadeSlideIn 0.8s ease-out 0.3s both;
        }

        /* ── Message ── */
        .message {
            font-size: clamp(1.05rem, 2.5vw, 1.25rem);
            line-height: 1.75;
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 3rem;
            max-width: 480px;
            animation: fadeSlideIn 0.8s ease-out 0.45s both;
        }

        .message strong {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ── WhatsApp CTA ── */
        .cta-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 40px;
            background: var(--whatsapp);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow:
                0 0 0 0 rgba(37, 211, 102, 0.3),
                0 4px 24px rgba(37, 211, 102, 0.15);
            animation: fadeSlideIn 0.8s ease-out 0.6s both;
            position: relative;
            overflow: hidden;
        }

        .cta-whatsapp::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
            border-radius: inherit;
        }

        .cta-whatsapp:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 0 0 6px rgba(37, 211, 102, 0.1),
                0 8px 40px rgba(37, 211, 102, 0.25);
            background: var(--whatsapp-dark);
        }

        .cta-whatsapp:active {
            transform: translateY(0) scale(0.98);
        }

        .cta-whatsapp svg {
            flex-shrink: 0;
        }

        /* ── Phone number hint ── */
        .phone-hint {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            animation: fadeSlideIn 0.8s ease-out 0.75s both;
        }

        .phone-hint a {
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: color 0.3s, border-color 0.3s;
        }

        .phone-hint a:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }

        /* ── Footer ── */
        .footer-line {
            position: fixed;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.1);
            z-index: 1;
            animation: fadeSlideIn 0.8s ease-out 1s both;
        }

        /* ── Animation ── */
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .hold-page {
                padding: 1.5rem;
            }

            .status-pill {
                margin-bottom: 2rem;
                font-size: 0.65rem;
                padding: 6px 16px;
            }

            .message {
                font-size: 1rem;
                margin-bottom: 2.5rem;
            }

            .cta-whatsapp {
                padding: 16px 32px;
                font-size: 1rem;
                width: 100%;
                justify-content: center;
            }

            .divider {
                margin-bottom: 2rem;
            }

            .footer-line {
                bottom: 1rem;
            }
        }
    </style>
</head>
